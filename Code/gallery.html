<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="js/theme-init.js"></script>
  <title>Canvas | Galería</title>
  <link rel="stylesheet" href="styles/main.css" />
</head>
<body data-page="gallery">
  <header class="topbar glass">
    <div class="header-left">
      <a class="brand" href="app.html">
        <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" style="width: 28px; height: 28px;">
          <rect x="2" y="2" width="28" height="28" rx="4" fill="none" stroke="url(#logoGradient)" stroke-width="1.5"/>
          <g stroke="url(#logoGradient)" stroke-width="1" opacity="0.8">
            <line x1="8" y1="2" x2="8" y2="30"/><line x1="14" y1="2" x2="14" y2="30"/><line x1="20" y1="2" x2="20" y2="30"/><line x1="26" y1="2" x2="26" y2="30"/>
            <line x1="2" y1="8" x2="30" y2="8"/><line x1="2" y1="14" x2="30" y2="14"/><line x1="2" y1="20" x2="30" y2="20"/><line x1="2" y1="26" x2="30" y2="26"/>
          </g>
          <rect x="3.5" y="3.5" width="4" height="4" fill="url(#logoGradient)" rx="0.5"/><rect x="11.5" y="3.5" width="4" height="4" fill="url(#accentGradient)" rx="0.5"/><rect x="19.5" y="3.5" width="4" height="4" fill="url(#logoGradient)" rx="0.5"/>
          <rect x="7.5" y="11.5" width="4" height="4" fill="url(#accentGradient)" rx="0.5"/><rect x="15.5" y="11.5" width="4" height="4" fill="url(#logoGradient)" rx="0.5"/><rect x="23.5" y="11.5" width="4" height="4" fill="url(#accentGradient)" rx="0.5"/>
          <rect x="5.5" y="19.5" width="4" height="4" fill="url(#logoGradient)" rx="0.5"/><rect x="13.5" y="19.5" width="4" height="4" fill="url(#accentGradient)" rx="0.5"/><rect x="21.5" y="19.5" width="4" height="4" fill="url(#logoGradient)" rx="0.5"/>
          <rect x="9.5" y="7.5" width="4" height="4" fill="#30b0c7" rx="0.5" opacity="0.6"/><rect x="17.5" y="25.5" width="4" height="4" fill="#5e5ce6" rx="0.5" opacity="0.6"/>
          <defs><linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#0a84ff;stop-opacity:1" /><stop offset="100%" style="stop-color:#5e5ce6;stop-opacity:1" /></linearGradient><linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#5e5ce6;stop-opacity:1" /><stop offset="100%" style="stop-color:#30b0c7;stop-opacity:1" /></linearGradient></defs>
        </svg>
        Canvas
      </a>
    </div>

    <nav class="topnav">
      <a href="create.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
          <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />
        </svg>
        Crear
      </a>
      <a class="active" href="gallery.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
          <circle cx="8.5" cy="8.5" r="1.5" />
          <polyline points="21 15 16 10 5 21" />
        </svg>
        Galería
      </a>
      <a href="shop.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="9" cy="21" r="1" />
          <circle cx="20" cy="21" r="1" />
          <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6" />
        </svg>
        Tienda
      </a>
      <a href="open-canvas.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="2" y="7" width="20" height="14" rx="2" ry="2" />
          <path d="M16 4l-4-4-4 4" />
        </svg>
        Open Canvas
      </a>
      <a href="shortcuts.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 17v4m-2-2h4M6 18h12a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2z" />
        </svg>
        Atajos
      </a>
    </nav>

    <div class="header-right">
      <div class="topstats">
        <span id="coinsStat" title="Monedas">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <circle cx="12" cy="12" r="10" />
            <text x="12" y="15" text-anchor="middle" fill="white" font-size="8" font-weight="bold">$</text>
          </svg>
          0
        </span>
        <span id="pixelsStat" title="Píxeles">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <rect x="4" y="4" width="16" height="16" />
            <rect x="8" y="8" width="4" height="4" fill="white" />
            <rect x="14" y="8" width="2" height="4" fill="white" />
            <rect x="8" y="14" width="8" height="2" fill="white" />
          </svg>
          0
        </span>
        <span id="chargesStat" title="Cargas">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" />
          </svg>
          0
        </span>
      </div>

      <div class="user-menu">
        <button id="userMenuBtn" class="user-btn">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z" />
          </svg>
          <span id="userEmail">Usuario</span>
        </button>
        <div id="userDropdown" class="dropdown hidden">
          <a href="#profile" class="dropdown-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
              <circle cx="12" cy="7" r="4" />
            </svg>
            Mi Perfil
          </a>
          <button class="dropdown-item" onclick="logout()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4" />
              <polyline points="10 17 15 12 10 7" />
              <line x1="15" y1="12" x2="3" y2="12" />
            </svg>
            Cerrar Sesión
          </button>
        </div>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="glass reveal gallery-hero">
      <p class="section-kicker">Galería</p>
      <h1>Mosaico de obras</h1>
      <p class="lead mini">Cuadrícula viva de piezas 16x16. Clic en una obra para abrir su ficha completa.</p>
    </section>

    <section id="emptyState" class="glass reveal empty" hidden>
      <h2>Aun no hay creaciones</h2>
      <p>Se el primero en publicar una pieza desde el editor.</p>
      <a class="btn solid" href="create.html">Crear ahora</a>
    </section>

    <section id="galleryGrid" class="gallery-grid gallery-square-grid"></section>
  </main>

  <script src="js/auth-check.js" type="module"></script>
  <script src="js/user-menu.js"></script>
  <script src="js/state.js" defer></script>
  <script src="js/ui.js" defer></script>
  <script src="js/gallery.js" defer></script>
</body>
</html>
