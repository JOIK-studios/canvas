<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="js/theme-init.js"></script>
  <title>Canvas | Obra</title>
  <link rel="stylesheet" href="styles/main.css" />
</head>
<body data-page="art">
  <header class="topbar glass">
    <div class="header-left">
      <a class="brand" href="app.html">
        <img src="images/logo.svg" alt="Canvas" class="brand-logo" />
        Canvas
      </a>
    </div>

    <nav class="topnav">
      <a href="create.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
          <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />
        </svg>
        Crear
      </a>
      <a class="active" href="gallery.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
          <circle cx="8.5" cy="8.5" r="1.5" />
          <polyline points="21 15 16 10 5 21" />
        </svg>
        Galería
      </a>
      <a href="shop.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="9" cy="21" r="1" />
          <circle cx="20" cy="21" r="1" />
          <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6" />
        </svg>
        Tienda
      </a>
      <a href="open-canvas.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="2" y="7" width="20" height="14" rx="2" ry="2" />
          <path d="M16 4l-4-4-4 4" />
        </svg>
        Open Canvas
      </a>
      <a href="shortcuts.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 17v4m-2-2h4M6 18h12a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2z" />
        </svg>
        Atajos
      </a>
    </nav>

    <div class="header-right">
      <div class="topstats">
        <span id="coinsStat" title="Monedas"></span>
        <span id="pixelsStat" title="Píxeles"></span>
        <span id="chargesStat" title="Cargas"></span>
      </div>

      <div class="user-menu">
        <button id="userMenuBtn" class="user-btn">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z" />
          </svg>
          <span id="userEmail">Usuario</span>
        </button>
        <div id="userDropdown" class="dropdown hidden">
          <a href="profile.html" class="dropdown-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
              <circle cx="12" cy="7" r="4" />
            </svg>
            Mi Perfil
          </a>
          <button class="dropdown-item" onclick="logout()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4" />
              <polyline points="10 17 15 12 10 7" />
              <line x1="15" y1="12" x2="3" y2="12" />
            </svg>
            Cerrar Sesión
          </button>
        </div>
      </div>
    </div>
  </header>

  <main class="container art-page-shell">
    <section id="artNotFound" class="glass reveal empty" hidden>
      <h1>Obra no encontrada</h1>
      <p>Puede que haya sido eliminada.</p>
      <a class="btn solid" href="gallery.html">Volver a galería</a>
    </section>

    <section id="artDetail" class="art-detail" hidden>
      <article class="glass art-detail-canvas-card reveal">
        <canvas id="artDetailCanvas" width="384" height="384"></canvas>
      </article>

      <article class="glass art-detail-info-card reveal">
        <h1 id="artDetailTitle">Obra</h1>
        <p id="artDetailMeta" class="meta"></p>
        <div id="artDetailActions" class="row"></div>
        <div id="artExportActions" class="row">
          <select id="artExportFormat" class="input" aria-label="Formato de exportación">
            <option value="image/png">PNG</option>
            <option value="image/jpeg">JPG</option>
            <option value="image/webp">WEBP</option>
          </select>
          <button id="artExportBtn" class="btn ghost sm" type="button">Guardar</button>
        </div>
        <div class="row comment">
          <input id="artDetailComment" class="comment-input" placeholder="Comentar" />
          <button id="artDetailSend" class="btn ghost sm" type="button">Enviar</button>
        </div>
        <ol id="artDetailComments" class="comment-list"></ol>
      </article>
    </section>
  </main>

  <script src="js/auth-check.js" type="module"></script>
  <script src="js/user-menu.js"></script>
  <script src="js/state.js" defer></script>
  <script src="js/ui.js" defer></script>
  <script src="js/art.js" defer></script>
</body>
</html>
